    <style>
      #info {
        display: flex;
        justify-content: space-evenly;
        flex-wrap: wrap;
        gap: 20px;
      }

      .card {
        width: 300px;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }

      .card h3 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <div id="info"></div>
  </body>

    $.get('https://jsonplaceholder.typicode.com/posts', function (data) {
      data.forEach(function (post) {
        $('#info').append(`
            <div class="card">
              <h3>${post.title}</h3>
              <p>${post.body}</p>
              <small>User ID: ${post.userId}</small>
            </div>
          `);
      });
    });
